<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    // GitHub Pages SPA redirect
    var l = window.location;
    var path = l.pathname;
    var base = '/Mama';

    // If we're in the /Mama directory
    if (path.startsWith(base + '/')) {
      var route = path.substring(base.length);
      l.replace(base + '/index.html#' + route);
    } else if (path !== base + '/index.html' && path !== base + '/') {
      l.replace(base + '/index.html');
    }
  </script>
</head>
<body>
</body>
</html>
