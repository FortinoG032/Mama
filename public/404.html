<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/Mama/index.html?redirect=' +
      encodeURIComponent(l.pathname.slice(0, l.pathname.length - 1).split('/').slice(-(pathSegmentsToKeep + 1)).join('/')) +
      (l.search ? '&' + l.search.slice(1) : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
